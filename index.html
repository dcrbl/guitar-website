<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Chord Reference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .control-panel {
            background-color: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #404040;
        }

        .control-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-row:last-child {
            margin-bottom: 0;
        }

        .control-label {
            font-weight: 600;
            min-width: 80px;
            color: #b0b0b0;
        }

        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            background-color: #3a3a3a;
            border: 2px solid #505050;
            color: #e0e0e0;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        button:hover {
            background-color: #454545;
            border-color: #606060;
        }

        button.active {
            background-color: #d4af37;
            color: #1a1a1a;
            border-color: #d4af37;
            font-weight: 600;
        }

        .chord-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
            justify-items: start;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .chord-grid {
                grid-template-columns: repeat(3, minmax(180px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .chord-grid {
                grid-template-columns: repeat(2, minmax(150px, 1fr));
            }
        }

        @media (max-width: 480px) {
            .chord-grid {
                grid-template-columns: 1fr;
            }
        }

        .chord-card {
            background-color: #2a2a2a;
            border: 1px solid #404040;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .chord-card-header {
            display: flex;
            align-items: baseline;
            margin-bottom: 12px;
            position: relative;
        }

        .chord-card h3 {
            font-size: 1.1rem;
            margin: 0;
            color: #d4af37;
            flex: 1;
            text-align: center;
        }

        .chord-card .degree {
            font-size: 0.85rem;
            color: #909090;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .fretboard-svg {
            width: 100%;
            height: auto;
        }

        .degree-toggle-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .degree-toggle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .degree-label {
            font-size: 0.75rem;
            color: #909090;
            font-weight: 600;
            height: 14px;
            line-height: 14px;
        }

        .degree-toggle button {
            padding: 6px 8px;
            font-size: 0.8rem;
            min-width: 45px;
        }

        .degree-toggle .quality {
            font-size: 0.7rem;
            color: #909090;
            height: 12px;
            line-height: 12px;
        }

        .variation-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 10px;
            justify-content: center;
        }

        .variation-btn {
            padding: 4px 8px;
            font-size: 0.7rem;
            min-width: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="control-panel">
            <div class="control-row">
                <span class="control-label">Key:</span>
                <div class="button-group" id="keySelector"></div>
            </div>

            <div class="control-row">
                <span class="control-label">Scale:</span>
                <div class="button-group" id="scaleTypeSelector"></div>
                <button id="downloadPdfBtn" onclick="downloadPDF()" style="margin-left: auto;">Download PDF</button>
            </div>

            <div class="control-row">
                <span class="control-label">Chords:</span>
                <div class="degree-toggle-group" id="degreeToggles"></div>
            </div>

        </div>

        <div class="chord-grid" id="chordGrid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script>
        // ==================== Music Theory Engine ====================

        const CHROMATIC_NOTES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

        // Map to flat names based on key
        const NOTE_ENHARMONIC = {
            'C': { sharps: 'C', flats: 'C' },
            'G': { sharps: 'C#', flats: 'C#' },
            'D': { sharps: 'C#', flats: 'C#' },
            'A': { sharps: 'C#', flats: 'C#' },
            'E': { sharps: 'C#', flats: 'C#' },
            'B': { sharps: 'C#', flats: 'C#' },
            'F#': { sharps: 'C#', flats: 'Db' },
            'F': { sharps: 'C', flats: 'Db' },
            'Bb': { sharps: 'C', flats: 'Db' },
            'Eb': { sharps: 'C#', flats: 'Db' },
            'Ab': { sharps: 'C#', flats: 'Db' },
            'Db': { sharps: 'C#', flats: 'Db' }
        };

        const SCALE_INTERVALS = {
            major: [0, 2, 4, 5, 7, 9, 11],
            minor: [0, 2, 3, 5, 7, 8, 10]
        };

        const CHORD_DEGREE_QUALITIES = {
            major: ['maj', 'min', 'min', 'maj', 'dom', 'min', 'dim'],
            minor: ['min', 'dim', 'maj', 'min', 'min', 'maj', 'maj']
        };

        const CHORD_FORMULAS = {
            maj: [0, 4, 7],
            min: [0, 3, 7],
            dim: [0, 3, 6],
            aug: [0, 4, 8],
            maj7: [0, 4, 7, 11],
            dom7: [0, 4, 7, 10],
            min7: [0, 3, 7, 10],
            dim7: [0, 3, 6, 9],
            add9: [0, 4, 7, 14],
            sus2: [0, 2, 7],
            sus4: [0, 5, 7],
            9: [0, 4, 7, 10, 14],
            11: [0, 4, 7, 10, 14, 17],
            13: [0, 4, 7, 10, 14, 17, 21],
            minAdd9: [0, 3, 7, 14],
            min9: [0, 3, 7, 10, 14],
            min11: [0, 3, 7, 10, 14, 17],
            min13: [0, 3, 7, 10, 14, 17, 21]
        };

        function getScaleNotes(root, scaleType) {
            const intervals = SCALE_INTERVALS[scaleType];
            const rootIndex = CHROMATIC_NOTES.indexOf(root);
            return intervals.map(interval => CHROMATIC_NOTES[(rootIndex + interval) % 12]);
        }

        function getChordNotes(root, baseQuality, variation) {
            let formula;
            // 'dom' quality: major triad, dominant 7th
            const isMinor = (baseQuality === 'min');
            const triadQuality = (baseQuality === 'dom') ? 'maj' : baseQuality;

            if (variation === 'Triad') {
                formula = CHORD_FORMULAS[triadQuality];
            } else if (variation === '7th') {
                if (baseQuality === 'maj') formula = CHORD_FORMULAS.dom7;
                else if (baseQuality === 'min') formula = CHORD_FORMULAS.min7;
                else if (baseQuality === 'dim') formula = CHORD_FORMULAS.dim7;
                else if (baseQuality === 'dom') formula = CHORD_FORMULAS.dom7;
            } else if (variation === 'Maj7') {
                formula = CHORD_FORMULAS.maj7;
            } else if (variation === 'Sus2') {
                formula = CHORD_FORMULAS.sus2;
            } else if (variation === 'Sus4') {
                formula = CHORD_FORMULAS.sus4;
            } else if (variation === 'Add9') {
                formula = isMinor ? CHORD_FORMULAS.minAdd9 : CHORD_FORMULAS.add9;
            } else if (variation === '9th') {
                formula = isMinor ? CHORD_FORMULAS.min9 : CHORD_FORMULAS['9'];
            } else if (variation === '11th') {
                formula = isMinor ? CHORD_FORMULAS.min11 : CHORD_FORMULAS['11'];
            } else if (variation === '13th') {
                formula = isMinor ? CHORD_FORMULAS.min13 : CHORD_FORMULAS['13'];
            }

            const rootIndex = CHROMATIC_NOTES.indexOf(root);
            return formula.map(interval => CHROMATIC_NOTES[(rootIndex + interval) % 12]);
        }

        function normalizeNoteName(note, key) {
            // Simple normalization - sharps for most keys, flats for Bb, Eb, Ab, Db
            if (['Bb', 'Eb', 'Ab', 'Db', 'Gb', 'Cb'].includes(key)) {
                // Prefer flats
                const flatMap = {
                    'C#': 'Db', 'D#': 'Eb', 'F#': 'Gb', 'G#': 'Ab', 'A#': 'Bb'
                };
                return flatMap[note] || note;
            }
            return note;
        }

        // ==================== Fretboard Engine ====================

        const STRING_TUNING = [40, 45, 50, 55, 59, 64]; // E2, A2, D3, G3, B3, E4 in MIDI
        const STRING_NAMES = ['E', 'A', 'D', 'G', 'B', 'e'];
        const FRETS = 17;

        function getMIDINoteAtFret(stringIndex, fret) {
            return STRING_TUNING[stringIndex] + fret;
        }

        function getNoteNameAtFret(stringIndex, fret) {
            const midiNote = getMIDINoteAtFret(stringIndex, fret);
            const noteIndex = midiNote % 12;
            return CHROMATIC_NOTES[noteIndex];
        }

        function renderFretboard(container, chordNotes, rootNote, scaleNotes) {
            const svgWidth = 200;
            const svgHeight = 480;
            const nutWidth = 8;
            const stringSpacing = (svgWidth - 40) / 5;
            const startX = 20;
            const startY = 30;
            const maxFretDistance = svgHeight - startY - 20;

            // Function to calculate fret Y position using logarithmic scaling (like a real guitar)
            // Scale is adjusted so that the last fret (FRETS) reaches near the bottom
            function getFretY(fretNumber) {
                // Logarithmic formula: position = scaledDistance * (1 - 1/2^(fret/12))
                // Scaled so that fret FRETS reaches maxFretDistance
                const normalizationFactor = 1 - Math.pow(2, -FRETS / 12);
                const scaledDistance = maxFretDistance / normalizationFactor;
                return startY + scaledDistance * (1 - Math.pow(2, -fretNumber / 12));
            }

            let svg = `<svg class="fretboard-svg" viewBox="0 0 ${svgWidth} ${svgHeight}" xmlns="http://www.w3.org/2000/svg">`;

            // Background
            svg += `<rect width="${svgWidth}" height="${svgHeight}" fill="#1a1a1a"/>`;

            // Fret numbers for each fret
            for (let i = 1; i <= FRETS; i++) {
                const y = getFretY(i);
                svg += `<text x="8" y="${y + 3}" font-size="8" fill="#707070" text-anchor="middle">${i}</text>`;
            }

            // Nut (thick line at top)
            svg += `<line x1="${startX}" y1="${startY}" x2="${startX + stringSpacing * 5}" y2="${startY}" stroke="#d4af37" stroke-width="3"/>`;

            // Frets and markers
            for (let i = 1; i <= FRETS; i++) {
                const y = getFretY(i);
                svg += `<line x1="${startX}" y1="${y}" x2="${startX + stringSpacing * 5}" y2="${y}" stroke="#505050" stroke-width="1"/>`;

                // Fret markers - only at specific frets
                const markerX = startX + stringSpacing * 2.5;
                if ([3, 5, 7, 9, 15, 17].includes(i)) {
                    // Single dot for these frets
                    svg += `<circle cx="${markerX}" cy="${y}" r="2" fill="#707070"/>`;
                } else if (i === 12) {
                    // Double dots at fret 12
                    svg += `<circle cx="${markerX - 4}" cy="${y}" r="2" fill="#707070"/>`;
                    svg += `<circle cx="${markerX + 4}" cy="${y}" r="2" fill="#707070"/>`;
                }
            }

            // Strings
            for (let s = 0; s < 6; s++) {
                const x = startX + s * stringSpacing;
                const endY = getFretY(FRETS);
                svg += `<line x1="${x}" y1="${startY}" x2="${x}" y2="${endY}" stroke="#e0e0e0" stroke-width="1.5"/>`;

                // String names at top
                svg += `<text x="${x}" y="${startY - 8}" font-size="11" fill="#b0b0b0" text-anchor="middle" font-weight="600">${STRING_NAMES[s]}</text>`;
            }

            // Dots on fretboard
            for (let s = 0; s < 6; s++) {
                for (let f = 0; f <= FRETS; f++) {
                    const noteName = getNoteNameAtFret(s, f);
                    const x = startX + s * stringSpacing;
                    const y = f === 0 ? startY : getFretY(f);

                    if (noteName === rootNote && chordNotes.includes(noteName)) {
                        // Root note - blue fill with yellow border
                        svg += `<circle cx="${x}" cy="${y}" r="8" fill="#4a90e2" stroke="#f5c542" stroke-width="1"/>`;
                        svg += `<text x="${x}" y="${y}" font-size="9" fill="#000000" text-anchor="middle" dominant-baseline="central" font-weight="700">${noteName}</text>`;
                    } else if (chordNotes.includes(noteName)) {
                        // Chord tone - filled blue
                        svg += `<circle cx="${x}" cy="${y}" r="8" fill="#4a90e2"/>`;
                        svg += `<text x="${x}" y="${y}" font-size="9" fill="#000000" text-anchor="middle" dominant-baseline="central" font-weight="600">${noteName}</text>`;
                    } else if (scaleNotes.includes(noteName)) {
                        // Scale note only - small hollow circle
                        svg += `<circle cx="${x}" cy="${y}" r="4" fill="none" stroke="#909090" stroke-width="1.5"/>`;
                    }
                }
            }

            svg += `</svg>`;
            container.innerHTML = svg;
        }

        // ==================== PDF Download ====================

        function drawFretboardPDF(doc, chordNotes, rootNote, scaleNotes, ox, oy, w, h) {
            // Map SVG coordinate space (200x480) to PDF space (w x h)
            const sx = w / 200, sy = h / 480;
            const stringSpacing = (200 - 40) / 5 * sx;
            const startX = ox + 20 * sx;
            const startY = oy + 30 * sy;
            const maxFretDistance = (480 - 30 - 20) * sy;

            function getFretY(fretNumber) {
                const norm = 1 - Math.pow(2, -FRETS / 12);
                const scaled = maxFretDistance / norm;
                return startY + scaled * (1 - Math.pow(2, -fretNumber / 12));
            }

            // Fret numbers
            doc.setFontSize(8 * sx / 0.225);
            doc.setTextColor(136, 136, 136);
            for (let i = 1; i <= FRETS; i++) {
                doc.text(String(i), ox + 8 * sx, getFretY(i) + 1, { align: 'center' });
            }

            // Nut
            doc.setDrawColor(0, 0, 0);
            doc.setLineWidth(0.8);
            doc.line(startX, startY, startX + stringSpacing * 5, startY);

            // Frets and markers
            for (let i = 1; i <= FRETS; i++) {
                const y = getFretY(i);
                doc.setDrawColor(170, 170, 170);
                doc.setLineWidth(0.2);
                doc.line(startX, y, startX + stringSpacing * 5, y);

                const markerX = startX + stringSpacing * 2.5;
                doc.setFillColor(204, 204, 204);
                if ([3, 5, 7, 9, 15, 17].includes(i)) {
                    doc.circle(markerX, y, 0.5 * sx, 'F');
                } else if (i === 12) {
                    doc.circle(markerX - 1 * sx, y, 0.5 * sx, 'F');
                    doc.circle(markerX + 1 * sx, y, 0.5 * sx, 'F');
                }
            }

            // Strings
            doc.setDrawColor(0, 0, 0);
            doc.setLineWidth(0.3);
            const endY = getFretY(FRETS);
            for (let s = 0; s < 6; s++) {
                const x = startX + s * stringSpacing;
                doc.line(x, startY, x, endY);
            }

            // String names
            doc.setFontSize(3);
            doc.setTextColor(0, 0, 0);
            doc.setFont('helvetica', 'bold');
            for (let s = 0; s < 6; s++) {
                const x = startX + s * stringSpacing;
                doc.text(STRING_NAMES[s], x, startY - 2 * sy, { align: 'center' });
            }
            doc.setFont('helvetica', 'normal');

            // Note dots
            const dotR = 8 * sx;
            const smallDotR = 4 * sx;
            const noteFontSize = dotR * 2.2;
            for (let s = 0; s < 6; s++) {
                for (let f = 0; f <= FRETS; f++) {
                    const noteName = getNoteNameAtFret(s, f);
                    const x = startX + s * stringSpacing;
                    const y = f === 0 ? startY : getFretY(f);

                    if (noteName === rootNote && chordNotes.includes(noteName)) {
                        doc.setFillColor(255, 255, 255);
                        doc.setDrawColor(0, 0, 0);
                        doc.setLineWidth(0.8);
                        doc.circle(x, y, dotR, 'FD');
                        doc.setFont('helvetica', 'bold');
                        doc.setFontSize(noteFontSize);
                        doc.setTextColor(0, 0, 0);
                        doc.text(noteName, x, y + noteFontSize * 0.12, { align: 'center' });
                    } else if (chordNotes.includes(noteName)) {
                        doc.setFillColor(255, 255, 255);
                        doc.setDrawColor(0, 0, 0);
                        doc.setLineWidth(0.3);
                        doc.circle(x, y, dotR, 'FD');
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(noteFontSize);
                        doc.setTextColor(0, 0, 0);
                        doc.text(noteName, x, y + noteFontSize * 0.12, { align: 'center' });
                    } else if (scaleNotes.includes(noteName)) {
                        doc.setFillColor(255, 255, 255);
                        doc.setDrawColor(170, 170, 170);
                        doc.setLineWidth(0.3);
                        doc.circle(x, y, smallDotR, 'FD');
                        doc.setFont('helvetica', 'normal');
                        doc.setFontSize(noteFontSize * 0.6);
                        doc.setTextColor(150, 150, 150);
                        doc.text(noteName, x, y + noteFontSize * 0.07, { align: 'center' });
                    }
                }
            }
        }

        function downloadPDF() {
            if (!window.jspdf) {
                alert('PDF library still loading. Please try again in a moment.');
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'letter' });

            const pageW = 279.4, pageH = 215.9;
            const margin = 15;
            const contentW = pageW - margin * 2;

            const scaleNotes = getScaleNotes(state.key, state.scaleType);
            const degreeNames = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII'];
            const qualities = CHORD_DEGREE_QUALITIES[state.scaleType];
            const sortedDegrees = Array.from(state.visibleDegrees).sort((a, b) => a - b);

            if (sortedDegrees.length === 0) {
                alert('Select at least one chord to download.');
                return;
            }

            const chordInfos = sortedDegrees.map(degreeIndex => {
                const degreeNote = scaleNotes[degreeIndex];
                const baseQuality = qualities[degreeIndex];
                const variation = state.chordVariations[degreeIndex] || 'Triad';
                const chordName = buildChordName(degreeNote, baseQuality, variation);
                const chordNotes = getChordNotes(degreeNote, baseQuality, variation);
                return { degreeIndex, degreeNote, baseQuality, variation, chordName, chordNotes, degreeName: degreeNames[degreeIndex] };
            });

            const scaleLabel = state.scaleType.charAt(0).toUpperCase() + state.scaleType.slice(1);

            const colCount = 4;
            const colWidth = contentW / colCount;
            const labelH = 12;
            const fretboardH = pageH - margin * 2 - labelH;
            const fretboardW = fretboardH * (200 / 480);

            const gapBetween = 30;
            const totalGaps = (colCount - 1) * gapBetween;
            const availW = contentW - totalGaps;
            const slotW = availW / colCount;

            function addHeader() {
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(12);
                doc.setTextColor(0, 0, 0);
                doc.text('Key of ' + state.key + ' ' + scaleLabel, pageW / 2, margin, { align: 'center' });
            }

            let page = 0;
            addHeader();

            for (let i = 0; i < chordInfos.length; i++) {
                const posOnPage = i - page * colCount;
                if (posOnPage >= colCount) {
                    doc.addPage();
                    page++;
                    addHeader();
                }
                const col = i - page * colCount;
                const colCenterX = margin + col * (slotW + gapBetween) + slotW / 2;
                const x = colCenterX - fretboardW / 2;
                const y = margin + labelH;

                const info = chordInfos[i];

                // Label above fretboard
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(11);
                doc.setTextColor(0, 0, 0);
                doc.text(info.chordName, colCenterX, margin + 7, { align: 'center' });
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(8);
                doc.setTextColor(100, 100, 100);
                doc.text(info.degreeName + ' - ' + info.variation, colCenterX, margin + 12, { align: 'center' });

                drawFretboardPDF(doc, info.chordNotes, info.degreeNote, scaleNotes, x, y, fretboardW, fretboardH);
            }

            doc.save('chords-' + state.key + '-' + state.scaleType + '.pdf');
        }

        // ==================== UI Controller ====================

        const state = {
            key: 'C',
            scaleType: 'major',
            visibleDegrees: new Set([0]),
            chordVariations: {
                0: 'Triad', 1: 'Triad', 2: 'Triad', 3: 'Triad',
                4: 'Triad', 5: 'Triad', 6: 'Triad'
            },
        };

        const VARIATIONS = ['Triad', '7th', 'Maj7', 'Sus2', 'Sus4', 'Add9', '9th', '11th', '13th'];

        function renderKeySelector() {
            const container = document.getElementById('keySelector');
            container.innerHTML = '';
            const sortedNotes = [...CHROMATIC_NOTES].sort();
            sortedNotes.forEach(note => {
                const btn = document.createElement('button');
                btn.textContent = note;
                btn.className = state.key === note ? 'active' : '';
                btn.addEventListener('click', () => {
                    state.key = note;
                    render();
                });
                container.appendChild(btn);
            });
        }

        function renderScaleTypeSelector() {
            const container = document.getElementById('scaleTypeSelector');
            container.innerHTML = '';
            ['major', 'minor'].forEach(type => {
                const btn = document.createElement('button');
                btn.textContent = type.charAt(0).toUpperCase() + type.slice(1);
                btn.className = state.scaleType === type ? 'active' : '';
                btn.addEventListener('click', () => {
                    state.scaleType = type;
                    render();
                });
                container.appendChild(btn);
            });
        }

        function renderDegreeToggles() {
            const container = document.getElementById('degreeToggles');
            container.innerHTML = '';
            const degreeNames = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII'];
            const qualities = CHORD_DEGREE_QUALITIES[state.scaleType];
            const scaleNotes = getScaleNotes(state.key, state.scaleType);

            degreeNames.forEach((name, index) => {
                const div = document.createElement('div');
                div.className = 'degree-toggle';

                const degreeNote = scaleNotes[index];
                const baseQuality = qualities[index];
                const chordName = buildChordName(degreeNote, baseQuality, 'Triad'); // Always show triad name on button

                const degreeLabel = document.createElement('div');
                degreeLabel.className = 'degree-label';
                degreeLabel.textContent = name;

                const btn = document.createElement('button');
                btn.textContent = chordName;
                btn.className = state.visibleDegrees.has(index) ? 'active' : '';
                btn.addEventListener('click', () => {
                    if (state.visibleDegrees.has(index)) {
                        state.visibleDegrees.delete(index);
                    } else {
                        state.visibleDegrees.add(index);
                    }
                    render();
                });

                div.appendChild(degreeLabel);
                div.appendChild(btn);
                container.appendChild(div);
            });
        }



        function buildChordName(root, baseQuality, variation) {
            const noteName = normalizeNoteName(root, state.key);

            if (variation === 'Triad') {
                if (baseQuality === 'maj' || baseQuality === 'dom') return noteName;
                if (baseQuality === 'min') return noteName + 'm';
                if (baseQuality === 'dim') return noteName + '°';
                if (baseQuality === 'aug') return noteName + '+';
            }

            if (variation === '7th') {
                if (baseQuality === 'maj') return noteName + '7';
                if (baseQuality === 'min') return noteName + 'm7';
                if (baseQuality === 'dim') return noteName + '°7';
                if (baseQuality === 'dom') return noteName + '7';
            }

            if (variation === 'Maj7') return noteName + 'maj7';
            if (variation === 'Sus2') return noteName + 'sus2';
            if (variation === 'Sus4') return noteName + 'sus4';
            if (variation === 'Add9') {
                if (baseQuality === 'min') return noteName + 'm(add9)';
                return noteName + 'add9';
            }
            if (variation === '9th') {
                if (baseQuality === 'min') return noteName + 'm9';
                return noteName + '9';
            }
            if (variation === '11th') {
                if (baseQuality === 'min') return noteName + 'm11';
                return noteName + '11';
            }
            if (variation === '13th') {
                if (baseQuality === 'min') return noteName + 'm13';
                return noteName + '13';
            }

            return noteName;
        }

        function renderChordGrid() {
            const container = document.getElementById('chordGrid');
            container.innerHTML = '';

            const scaleNotes = getScaleNotes(state.key, state.scaleType);
            const degreeNames = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII'];
            const qualities = CHORD_DEGREE_QUALITIES[state.scaleType];

            Array.from(state.visibleDegrees).sort((a, b) => a - b).forEach(degreeIndex => {
                const degreeNote = scaleNotes[degreeIndex];
                const baseQuality = qualities[degreeIndex];
                const variation = state.chordVariations[degreeIndex] || 'Triad';
                const chordName = buildChordName(degreeNote, baseQuality, variation);
                const chordNotes = getChordNotes(degreeNote, baseQuality, variation);

                const card = document.createElement('div');
                card.className = 'chord-card';

                const header = document.createElement('div');
                header.className = 'chord-card-header';

                const degree = document.createElement('div');
                degree.className = 'degree';
                degree.textContent = `(${degreeNames[degreeIndex]})`;

                const title = document.createElement('h3');
                title.textContent = chordName;

                const fretboardDiv = document.createElement('div');

                // Variation selector for this chord
                const variationContainer = document.createElement('div');
                variationContainer.className = 'variation-selector';
                VARIATIONS.forEach(var_name => {
                    const btn = document.createElement('button');
                    btn.textContent = var_name;
                    btn.className = `variation-btn ${variation === var_name ? 'active' : ''}`;
                    btn.addEventListener('click', () => {
                        state.chordVariations[degreeIndex] = var_name;
                        render();
                    });
                    variationContainer.appendChild(btn);
                });

                header.appendChild(degree);
                header.appendChild(title);
                card.appendChild(header);
                card.appendChild(variationContainer);
                card.appendChild(fretboardDiv);
                container.appendChild(card);

                renderFretboard(fretboardDiv, chordNotes, degreeNote, scaleNotes);
            });
        }

        function render() {
            renderKeySelector();
            renderScaleTypeSelector();
            renderDegreeToggles();
            renderChordGrid();
        }

        // Expose for testing
        window.CHROMATIC_NOTES = CHROMATIC_NOTES;
        window.SCALE_INTERVALS = SCALE_INTERVALS;
        window.CHORD_DEGREE_QUALITIES = CHORD_DEGREE_QUALITIES;
        window.CHORD_FORMULAS = CHORD_FORMULAS;
        window.STRING_TUNING = STRING_TUNING;
        window.getScaleNotes = getScaleNotes;
        window.getChordNotes = getChordNotes;
        window.getNoteNameAtFret = getNoteNameAtFret;
        window.getMIDINoteAtFret = getMIDINoteAtFret;
        window.buildChordName = buildChordName;

        // Initial render
        render();
    </script>
</body>
</html>
